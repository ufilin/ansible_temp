---
# tasks file for vector-role
    - name: Ensure DNS is configured
      become: true
      ansible.builtin.lineinfile:
        path: /etc/resolv.conf
        line: "nameserver 8.8.8.8"
        insertbefore: BOF
      register: dns_config

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - curl
          - tar
        state: present

    - name: Download Vector from GitHub
      ansible.builtin.get_url:
        url: "https://github.com/vectordotdev/vector/releases/download/v0.21.1/vector-0.21.1-x86_64-unknown-linux-gnu.tar.gz"
        dest: "/tmp/vector.tar.gz"
        mode: '0644'
      register: download_vector
      until: download_vector is success
      retries: 3
      delay: 5

    - name: Extract Vector
      ansible.builtin.unarchive:
        src: "/tmp/vector.tar.gz"
        dest: "/tmp"
        remote_src: true
        creates: "/tmp/vector-x86_64-unknown-linux-gnu/bin/vector"

    - name: Install Vector binary
      ansible.builtin.copy:
        src: "/tmp/vector-x86_64-unknown-linux-gnu/bin/vector"
        dest: "/usr/bin/vector"
        mode: '0755'
        remote_src: true

    - name: Create Vector config directory
      ansible.builtin.file:
        path: /etc/vector
        state: directory
        mode: '0755'

    - name: Create Vector config file
      ansible.builtin.template:
        src: vector.yml.j2
        dest: /etc/vector/vector.yaml
        mode: '0644'
      notify: Restart vector

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/vector.tar.gz"
        - "/tmp/vector-x86_64-unknown-linux-gnu"

    - name: Create systemd service for Vector
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        content: |
          [Unit]
          Description=Vector
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=root
          Group=root
          ExecStart=/usr/bin/vector --config /etc/vector/vector.yaml
          Restart=always
          RestartSec=10
          LimitNOFILE=1048576

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Restart vector

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start Vector
      ansible.builtin.systemd:
        name: vector
        state: started
        enabled: true